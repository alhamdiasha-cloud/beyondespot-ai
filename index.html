<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyondespot AI</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🚀 Beyondespot AI</h2>
            <p>Marketing Factory</p>
        </div>

        <!-- Menu akan dibuat otomatis oleh engine.js -->
        <div id="sidebar"></div>

    </aside>

    <!-- Main -->
    <main class="content">

        <div class="header">

            <h1 id="toolTitle">
                Selamat Datang
            </h1>

            <p id="toolCategory">
                Pilih tool di sebelah kiri.
            </p>

        </div>

        <!-- Form Tool -->
        <section
            id="toolForm"
            class="card">

            <p>
                Pilih salah satu tool untuk memulai.
            </p>

        </section>

        <!-- Hasil -->
        <section
            id="result"
            class="card">

            <p>
                Hasil generate akan muncul di sini.
            </p>

        </section>

    </main>

</div>

<script src="js/engine.js"></script>

</body>
</html>
